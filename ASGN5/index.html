<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5: Outpost 160</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        #info {
            position: absolute; top: 15px; width: 100%; text-align: center;
            color: #00ffff; font-family: 'Courier New', Courier, monospace;
            font-weight: bold; text-shadow: 0px 0px 8px #00ffff;
            pointer-events: none; user-select: none; z-index: 10;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h2 style="margin:0; letter-spacing: 2px;">OUTPOST 160</h2>
        <span style="font-size: 0.85rem; color: #fff; text-shadow: 1px 1px 2px #000;">
            Drag to Orbit | Scroll to Zoom Out (Massive Scale)
        </span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js'; 
        
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        // 1. CORE SCENE SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0f1a, 0.003); 

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 60, 140); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, toneMapping: THREE.ACESFilmicToneMapping });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        const mixers = []; 
        const animatedObjects =[]; 

        // 2. WOW FEATURES (BLOOM & REFLECTION)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.8; 
        bloomPass.strength = 1.2;  
        bloomPass.radius = 0.6;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, { generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter });
        const cubeCamera = new THREE.CubeCamera(0.1, 1000, cubeRenderTarget);
        scene.add(cubeCamera); 

        // 3. TEXTURES & MATERIALS 
        function createCrateTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#8B5A2B'; ctx.fillRect(0,0,256,256);
            ctx.strokeStyle = '#5C3A21'; ctx.lineWidth = 10;
            ctx.strokeRect(0,0,256,256);
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(256,256); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(256,0); ctx.lineTo(0,256); ctx.stroke();
            return new THREE.CanvasTexture(canvas);
        }
        
        const matCrate = new THREE.MeshStandardMaterial({ map: createCrateTexture(), roughness: 0.9 });
        const matConcrete = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        const matPath = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6, metalness: 0.3 });
        const matNeonCyan = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 });
        const matNeonOrange = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 2 });

        // 4. ENVIRONMENT & LIGHTING
        new THREE.TextureLoader().load(
            'images/skybox.jpg', 
            (tex) => { tex.mapping = THREE.EquirectangularReflectionMapping; scene.background = tex; scene.environment = tex; },
            undefined, () => { scene.background = new THREE.Color(0x0a0f1a); } 
        );

        scene.add(new THREE.AmbientLight(0xffffff, 0.3)); 
        scene.add(new THREE.HemisphereLight(0x44aaff, 0x111122, 0.4));

        const mainLight = new THREE.DirectionalLight(0xaaccff, 1.5); 
        mainLight.position.set(100, 150, -100);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 4096;
        mainLight.shadow.mapSize.height = 4096;
        mainLight.shadow.camera.left = -120; mainLight.shadow.camera.right = 120;
        mainLight.shadow.camera.top = 120; mainLight.shadow.camera.bottom = -120;
        scene.add(mainLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(210,210), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        // 5. CITY PLANNING (Zones & Shapes)
        
        // --- 5A. The Grand Cross Paths ---
        const pathH = new THREE.Mesh(new THREE.PlaneGeometry(200, 20), matPath);
        pathH.rotation.x = -Math.PI/2; pathH.position.y = 0.1; pathH.receiveShadow = true; scene.add(pathH);
        const pathV = new THREE.Mesh(new THREE.PlaneGeometry(20, 200), matPath);
        pathV.rotation.x = -Math.PI/2; pathV.position.y = 0.1; pathV.receiveShadow = true; scene.add(pathV);

        // --- 5B. Center Plaza & Mirror Sphere ---
        const altar = new THREE.Mesh(new THREE.CylinderGeometry(5, 7, 2, 32), matConcrete);
        altar.position.set(0, 1, 0); altar.castShadow = true; scene.add(altar);

        const mirrorSphere = new THREE.Mesh(new THREE.SphereGeometry(3, 64, 64), new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.texture, roughness: 0.0, metalness: 1.0 }));
        mirrorSphere.position.set(0, 6, 0); scene.add(mirrorSphere);
        cubeCamera.position.copy(mirrorSphere.position);
        animatedObjects.push({ mesh: mirrorSphere, baseY: 6, speed: 1.5, offset: 0 });

        // --- 5C. Perimeter Wall ---
        const wallGeo = new THREE.BoxGeometry(10, 20, 10);
        for(let i = -100; i <= 100; i += 10) {
            if(Math.abs(i) > 15) { 
                let wN = new THREE.Mesh(wallGeo, matConcrete); wN.position.set(i, 10, -100); wN.castShadow=true; scene.add(wN);
                let wS = new THREE.Mesh(wallGeo, matConcrete); wS.position.set(i, 10, 100); wS.castShadow=true; scene.add(wS);
                let wE = new THREE.Mesh(wallGeo, matConcrete); wE.position.set(100, 10, i); wE.castShadow=true; scene.add(wE);
                let wW = new THREE.Mesh(wallGeo, matConcrete); wW.position.set(-100, 10, i); wW.castShadow=true; scene.add(wW);
            }
        }

        // --- 5D. Streetlights ---
        const lightPositions =[ {x:20,z:20}, {x:-20,z:20}, {x:20,z:-20}, {x:-20,z:-20}, {x:80,z:12}, {x:-80,z:-12}, {x:12,z:80}, {x:-12,z:-80} ];
        lightPositions.forEach(p => {
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 10), matConcrete);
            pole.position.set(p.x, 5, p.z); pole.castShadow = true; scene.add(pole);
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(1.2), matNeonCyan);
            bulb.position.set(p.x, 10.5, p.z); scene.add(bulb);
            const ptLight = new THREE.PointLight(0x00ffff, 2, 40);
            ptLight.position.set(p.x, 10.5, p.z); scene.add(ptLight);
        });

        // --- 5E. Sector 1: Habitat (SE Quadrant) ---
        const bldgGeo = new THREE.BoxGeometry(20, 30, 20);
        const winGeo = new THREE.PlaneGeometry(12, 6);[{x:50, z:50}, {x:80, z:50}, {x:50, z:80}].forEach(p => {
            const bldg = new THREE.Mesh(bldgGeo, matConcrete);
            bldg.position.set(p.x, 15, p.z); bldg.castShadow = true; scene.add(bldg);
            const win = new THREE.Mesh(winGeo, matNeonOrange);
            win.position.set(p.x - 10.1, 20, p.z); win.rotation.y = -Math.PI/2; scene.add(win); 
        });

        // --- 5F. Sector 2: Cargo (SW Quadrant) ---
        const crateGeo = new THREE.BoxGeometry(5, 5, 5);
        for(let stack=0; stack<4; stack++) {
            const bx = -40 - Math.random()*30; const bz = 40 + Math.random()*30;
            for(let y=0; y<3; y++) {
                for(let x=0; x<3-y; x++) {
                    const crate = new THREE.Mesh(crateGeo, matCrate);
                    crate.position.set(bx + x*5.1 + y*2.5, 2.5 + y*5, bz);
                    crate.castShadow = true; scene.add(crate);
                }
            }
        }

        // --- 5G. Sector 3: Botanical (NW Quadrant) ---
        const trunkGeo = new THREE.CylinderGeometry(0.6, 1, 8);
        const leafGeo = new THREE.IcosahedronGeometry(4, 1);
        const matWood = new THREE.MeshStandardMaterial({color: 0x3d2817});
        const matLeaf = new THREE.MeshStandardMaterial({color: 0x1e592f, flatShading: true});
        for(let i=0; i<25; i++) {
            const tx = -30 - Math.random()*60; const tz = -30 - Math.random()*60;
            const trunk = new THREE.Mesh(trunkGeo, matWood); trunk.position.set(tx, 4, tz); trunk.castShadow=true; scene.add(trunk);
            const leaf = new THREE.Mesh(leafGeo, matLeaf); leaf.position.set(tx, 9, tz); leaf.castShadow=true; scene.add(leaf);
        }

        // 6. ANIMATED GLB MODELS (Using SkeletonUtils)
        const gltfLoader = new GLTFLoader();

        function spawnAnimatedModel(url, positionsArray) {
            gltfLoader.load(url, (gltf) => {
                const template = gltf.scene;
                positionsArray.forEach(cfg => {
                    const clone = SkeletonUtils.clone(template);
                    clone.position.set(cfg.x, cfg.y, cfg.z);
                    clone.scale.set(cfg.s, cfg.s, cfg.s);
                    clone.rotation.y = cfg.rot;
                    clone.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                    
                    if(cfg.group) cfg.group.add(clone);
                    else scene.add(clone);

                    if (gltf.animations.length > 0) {
                        const mixer = new THREE.AnimationMixer(clone);
                        let clip = gltf.animations[0];
                        const keywords =['walk', 'run', 'fly', 'gallop'];
                        gltf.animations.forEach(a => {
                            if(keywords.some(k => a.name.toLowerCase().includes(k))) clip = a;
                        });
                        mixer.clipAction(clip).play();
                        mixers.push(mixer);
                    }
                });
            });
        }

        // A. Soldiers 
        spawnAnimatedModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb',[
            {x: 35, y:0, z:50, s: 3, rot: -Math.PI/2}, // Moved West from Tower 1
            {x: 35, y:0, z:80, s: 3, rot: -Math.PI/2}, // Moved West from Tower 2
            {x: 80, y:0, z:35, s: 3, rot: Math.PI},    // Moved North from Tower 3
            {x: 15, y:0, z:15, s: 3, rot: -Math.PI/4}  // Center plaza guard
        ]);
        // B. Robots 
        spawnAnimatedModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/RobotExpressive/RobotExpressive.glb',[
            {x: -10, y:0, z:50, s: 1.5, rot: Math.PI/4}, {x: -45, y:0, z:30, s: 1.5, rot: Math.PI/2},
            {x: -25, y:0, z:70, s: 1.5, rot: -Math.PI/4}
        ]);

        // C. Generators
        spawnAnimatedModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/PrimaryIonDrive.glb',[
            {x: 50, y:0, z:-50, s: 4, rot: 0}, {x: 80, y:0, z:-50, s: 4, rot: 0}, 
            {x: 50, y:0, z:-80, s: 4, rot: 0}, {x: 80, y:0, z:-80, s: 4, rot: 0}
        ]);

        // D. Horses 
        spawnAnimatedModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Horse.glb',[
            {x: -80, y:0, z:80, s: 0.04, rot: Math.PI/2}, {x: -70, y:0, z:90, s: 0.04, rot: -Math.PI/4}
        ]);

        // E. Flying Parrots
        const parrotGroup = new THREE.Group(); scene.add(parrotGroup);
        const parrotConfigs =[];
        for(let i=0; i<8; i++) {
            const angle = (i/8) * Math.PI*2;
            parrotConfigs.push({
                x: Math.cos(angle)*30, y: 35 + Math.random()*10, z: Math.sin(angle)*30, 
                s: 0.08, rot: -angle + Math.PI/2, group: parrotGroup
            });
        }
        spawnAnimatedModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Parrot.glb', parrotConfigs);

        // F. Flying Flamingos
        const flamingoGroup = new THREE.Group(); scene.add(flamingoGroup);
        const flamingoConfigs =[];
        for(let i=0; i<8; i++) {
            const angle = (i/8) * Math.PI*2;
            flamingoConfigs.push({
                x: Math.cos(angle)*30, y: 35 + Math.random()*10, z: Math.sin(angle)*30, 
                s: 0.08, rot: -angle + Math.PI/2, group: flamingoGroup
            });
        }
        spawnAnimatedModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/flamingo.glb', flamingoConfigs);

        const fontLoader = new FontLoader();
        fontLoader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
            const textGeo = new TextGeometry('OUTPOST 160', {
                font: font, size: 2.5, height: 0.4, curveSegments: 12,
                bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.03, bevelSegments: 3
            });
            textGeo.computeBoundingBox();
            const offset = -0.5 * (textGeo.boundingBox.max.x - textGeo.boundingBox.min.x);
            
            const textMesh = new THREE.Mesh(textGeo, new THREE.MeshStandardMaterial({ 
                color: 0xffffff, emissive: 0x00aaff, emissiveIntensity: 2 
            }));
            textMesh.position.set(offset, 12, 0); // Hovering above the center plaza
            scene.add(textMesh);
            
            // Add to animated objects array for floating effect
            animatedObjects.push({ mesh: textMesh, baseY: 12, speed: 1.5, offset: 5 });
        });

        // ==========================================
        // 7. CAMERA CONTROLS
        // ==========================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 5, 0); 
        controls.maxPolarAngle = Math.PI / 2 - 0.02; // Prevent going under the floor
        controls.maxDistance = 350; // Massive scale zoom limit

8        // 8. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta(); // Time between frames (crucial for smooth glb animation)
            const time = clock.getElapsedTime();

            // 1. Update Skeletal Animations (Models)
            mixers.forEach(mixer => mixer.update(delta));

            // 2. Bobbing objects (Mirror Sphere, 3D Text)
            animatedObjects.forEach(obj => {
                obj.mesh.position.y = obj.baseY + Math.sin(time * obj.speed + obj.offset) * 0.5;
            });

            // 3. Rotate flying flocks in massive circles overhead
            if (typeof parrotGroup !== 'undefined') parrotGroup.rotation.y -= 0.5 * delta;
            if (typeof flamingoGroup !== 'undefined') flamingoGroup.rotation.y += 0.3 * delta;

            // 4. Update Real-Time Mirror Reflection
            mirrorSphere.visible = false;
            cubeCamera.update(renderer, scene);
            mirrorSphere.visible = true;

            // 5. Render using Post-Processing Composer (for Bloom)
            controls.update();
            composer.render();
        }

        // 9. WINDOW RESIZE HANDLER
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight); 
        });

        // Start Loop
        animate();
    </script>
</body>
</html>
